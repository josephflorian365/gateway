server:
  port: 8080

spring:
  application:
    name: gateway
  main:
    web-application-type: reactive
  cloud:
    config:
      enabled: false
      import-check:
        enabled: false
    gateway:
      default-filters:
        - PreserveHostHeader
      routes:
        - id: auth
          uri: no://op
          predicates:
            - Path=/auth/**
        - id: client-service
          uri: lb://client-service
          predicates:
            - Path=/clients, /clients/**
          filters:
            - name: CircuitBreaker
              args:
                name: clientServiceCircuitBreaker
                fallbackUri: forward:/fallback/client-service
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/accounts/**, /credits/**, /transactions/**, /reports/**, /debit-cards/**, /yanki-wallets/**
          filters:
            - RewritePath=/(?<service>accounts|credits|transactions|reports|debit-cards|yanki-wallets)/(?<path>.*), /${service}/${path}
            - name: CircuitBreaker
              args:
                name: productServiceCircuitBreaker
                fallbackUri: forward:/fallback/product-service
  security:
    user:
      name: ${GATEWAY_USERNAME:admin}
      password: ${GATEWAY_PASSWORD:admin123}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://eureka-server:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: "*"

resilience4j:
  circuitbreaker:
    instances:
      clientServiceCircuitBreaker:
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 2s
      productServiceCircuitBreaker:
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 2s
  timelimiter:
    instances:
      clientServiceCircuitBreaker:
        timeoutDuration: 2s
      productServiceCircuitBreaker:
        timeoutDuration: 2s

security:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-key-to-a-longer-value-1234567890}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
